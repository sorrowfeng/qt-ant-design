<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Ant Design — Official Component Reference</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/antd@5.24.7/dist/reset.css"/>
<script src="https://cdn.jsdelivr.net/npm/react@18.3.1/umd/react.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/react-dom@18.3.1/umd/react-dom.production.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/dayjs@1.11.13/dayjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/antd@5.24.7/dist/antd.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@babel/standalone@7.26.10/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ant-design/icons@5.6.1/dist/index.umd.min.js"></script>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  html, body, #root { height:100%; }
  body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif; }
  .layout { display:flex; height:100vh; }
  .sidebar { width:220px; background:#fff; border-right:1px solid #f0f0f0;
             display:flex; flex-direction:column; flex-shrink:0; overflow:hidden; }
  .sidebar-brand { padding:16px 20px; font-size:18px; font-weight:600; border-bottom:1px solid #f0f0f0; }
  .sidebar-nav { flex:1; overflow-y:auto; padding:8px 0; }
  .sidebar-nav::-webkit-scrollbar { width:6px; }
  .sidebar-nav::-webkit-scrollbar-thumb { background:#d9d9d9; border-radius:3px; }
  .cat-header { padding:8px 20px 4px; font-size:12px; color:#8c8c8c; font-weight:600;
                text-transform:uppercase; letter-spacing:.5px; }
  .nav-item { display:block; padding:6px 20px; cursor:pointer; color:#333;
              font-size:14px; transition:all .15s; border-left:3px solid transparent; }
  .nav-item:hover { background:#f5f5f5; }
  .nav-item.active { color:#1677ff; background:#e6f4ff; border-left-color:#1677ff; }
  .content { flex:1; overflow-y:auto; padding:24px 32px; background:#fafafa; }
  .content::-webkit-scrollbar { width:8px; }
  .content::-webkit-scrollbar-thumb { background:#d9d9d9; border-radius:4px; }
  .page-title { font-size:28px; font-weight:600; margin-bottom:8px; }
  .page-desc { color:#8c8c8c; margin-bottom:24px; font-size:14px; }
  .section { background:#fff; border-radius:8px; padding:20px 24px; margin-bottom:16px;
             border:1px solid #f0f0f0; }
  .section-title { font-size:15px; font-weight:600; margin-bottom:14px; color:#333;
                   padding-bottom:8px; border-bottom:1px solid #f0f0f0; }
  .demo-row { display:flex; flex-wrap:wrap; gap:12px; align-items:center; margin-bottom:12px; }
  .demo-row:last-child { margin-bottom:0; }
  .demo-block { margin-bottom:16px; }
  .demo-block:last-child { margin-bottom:0; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const {
  Button, ConfigProvider, Input, Select, Checkbox, Radio, Switch, Slider,
  InputNumber, DatePicker, TimePicker, Rate, Upload, Transfer, TreeSelect,
  Cascader, Mentions, ColorPicker, AutoComplete, Form,
  Avatar, Badge, Card, Calendar, Carousel, Collapse, Descriptions, Empty,
  Image, List, Popover, QRCode, Segmented, Statistic, Table, Tabs, Tag,
  Timeline, Tooltip, Tree,
  Alert, Drawer, Message, Modal, Notification, Popconfirm, Progress, Result,
  Skeleton, Spin, Tour, Watermark,
  App, FloatButton, Divider, Flex, Grid, Space, Layout, Splitter,
  Breadcrumb, Dropdown, Menu, Pagination, Steps, Anchor, Affix,
  Typography
} = antd;
const icons = window.icons || {};
const {
  SearchOutlined, EditOutlined, DeleteOutlined, EllipsisOutlined,
  CheckCircleFilled, CloseCircleFilled, ExclamationCircleFilled,
  InfoCircleFilled, PlusOutlined, MinusOutlined, LeftOutlined,
  RightOutlined, UpOutlined, DownOutlined, HomeOutlined, UserOutlined,
  MailOutlined, AppstoreOutlined, SettingOutlined, StarOutlined,
  HeartOutlined, LikeOutlined, MessageOutlined, BellOutlined,
  CalendarOutlined, ClockCircleOutlined, CheckOutlined, CloseOutlined,
  LoadingOutlined, CloudUploadOutlined, InboxOutlined
} = icons;

const { Title, Text, Paragraph, Link } = Typography;
const { TextArea } = Input;
const { Row, Col } = antd;
const { SubMenu } = Menu;
const { Panel } = Collapse;
const { RangePicker } = DatePicker;
const { RangePicker: TimeRangePicker } = TimePicker;
const { Dragger } = Upload;

/* ═══════════════════════════════════════════════════
   Navigation registry — mirrors PageRegistry.cpp
   ═══════════════════════════════════════════════════ */
const registry = [
  { cat:"General", pages:["Button","Icon","Typography"] },
  { cat:"Layout", pages:["Divider","Flex","Grid","Layout","Space","Splitter"] },
  { cat:"Navigation", pages:["Affix","Anchor","Breadcrumb","Dropdown","Menu","Pagination","Steps"] },
  { cat:"Data Entry", pages:["AutoComplete","Cascader","Checkbox","ColorPicker","DatePicker","Form",
    "Input","InputNumber","Mentions","Radio","Rate","Select","Slider","Switch","TimePicker",
    "Transfer","TreeSelect","Upload"] },
  { cat:"Data Display", pages:["Avatar","Badge","Calendar","Card","Carousel","Collapse","Descriptions",
    "Empty","Image","List","Popover","QRCode","Segmented","Statistic","Table","Tabs","Tag",
    "Timeline","Tooltip","Tree"] },
  { cat:"Feedback", pages:["Alert","Drawer","Message","Modal","Notification","Popconfirm","Progress",
    "Result","Skeleton","Spin","Tour","Watermark"] },
  { cat:"Other", pages:["App","ConfigProvider","FloatButton"] },
];

/* ═══════════════════════════════════════════════════
   Page components
   ═══════════════════════════════════════════════════ */

function ButtonPage(){
  return(<>
    <div className="section"><div className="section-title">Button Types</div>
      <div className="demo-row">
        <Button type="primary">Primary</Button>
        <Button>Default</Button>
        <Button type="dashed">Dashed</Button>
        <Button type="text">Text</Button>
        <Button type="link">Link</Button>
      </div>
    </div>
    <div className="section"><div className="section-title">Danger &amp; Disabled</div>
      <div className="demo-row">
        <Button type="primary" danger>Primary Danger</Button>
        <Button danger>Default Danger</Button>
        <Button type="primary" disabled>Disabled</Button>
      </div>
    </div>
    <div className="section"><div className="section-title">Sizes</div>
      <div className="demo-row">
        <Button type="primary" size="large">Large</Button>
        <Button type="primary">Middle</Button>
        <Button type="primary" size="small">Small</Button>
      </div>
    </div>
    <div className="section"><div className="section-title">Shapes</div>
      <div className="demo-row">
        <Button type="primary" shape="round">Round</Button>
        <Button type="primary" shape="circle" icon={<SearchOutlined/>}/>
        <Button type="primary" ghost>Ghost</Button>
        <Button type="primary" loading>Loading</Button>
      </div>
    </div>
  </>);
}

function IconPage(){
  const iconList = [
    { name:"Home", icon: <HomeOutlined/> },{ name:"User", icon: <UserOutlined/> },
    { name:"Search", icon: <SearchOutlined/> },{ name:"Setting", icon: <SettingOutlined/> },
    { name:"Star", icon: <StarOutlined/> },{ name:"Heart", icon: <HeartOutlined/> },
    { name:"Bell", icon: <BellOutlined/> },{ name:"Mail", icon: <MailOutlined/> },
    { name:"Calendar", icon: <CalendarOutlined/> },{ name:"Clock", icon: <ClockCircleOutlined/> },
    { name:"Check", icon: <CheckOutlined/> },{ name:"Close", icon: <CloseOutlined/> },
    { name:"Plus", icon: <PlusOutlined/> },{ name:"Edit", icon: <EditOutlined/> },
    { name:"Delete", icon: <DeleteOutlined/> },{ name:"Upload", icon: <CloudUploadOutlined/> },
  ];
  return(<>
    <div className="section"><div className="section-title">Outlined Icons</div>
      <div className="demo-row" style={{gap:20}}>
        {iconList.map(i=>(
          <div key={i.name} style={{textAlign:'center',width:72}}>
            <div style={{fontSize:22,marginBottom:4}}>{i.icon}</div>
            <div style={{fontSize:12,color:'#8c8c8c'}}>{i.name}</div>
          </div>
        ))}
      </div>
    </div>
  </>);
}

function TypographyPage(){
  return(<>
    <div className="section"><div className="section-title">Title Levels</div>
      <Title level={1}>Ant Design Title Level 1</Title>
      <Title level={2}>Ant Design Title Level 2</Title>
      <Title level={3}>Ant Design Title Level 3</Title>
      <Title level={4}>Ant Design Title Level 4</Title>
      <Title level={5}>Ant Design Title Level 5</Title>
    </div>
    <div className="section"><div className="section-title">Text Types</div>
      <div className="demo-row">
        <Text>Primary Text</Text>
        <Text type="secondary">Secondary Text</Text>
        <Text type="success">Success Text</Text>
        <Text type="warning">Warning Text</Text>
        <Text type="danger">Danger Text</Text>
        <Link href="https://ant.design" target="_blank">Link Text</Link>
      </div>
    </div>
    <div className="section"><div className="section-title">Decorations</div>
      <div style={{display:'flex',flexDirection:'column',gap:8}}>
        <Text strong>Strong Text</Text>
        <Text underline>Underline Text</Text>
        <Text delete>Delete Text</Text>
        <Text code>Code Text</Text>
        <Text mark>Mark Text</Text>
        <Text italic>Italic Text</Text>
      </div>
    </div>
    <div className="section"><div className="section-title">Paragraph</div>
      <Paragraph>Ant Design is a design system for enterprise-level products. Create an efficient and enjoyable work experience with the design language.</Paragraph>
    </div>
    <div className="section"><div className="section-title">Copyable</div>
      <Paragraph copyable>This text is copyable. Click to copy!</Paragraph>
    </div>
  </>);
}

function DividerPage(){
  return(<>
    <div className="section"><div className="section-title">Horizontal</div>
      <Paragraph>Top content</Paragraph><Divider/><Paragraph>Bottom content</Paragraph>
    </div>
    <div className="section"><div className="section-title">With Title</div>
      <Divider orientation="left">Left Text</Divider>
      <Divider orientation="center">Center Text</Divider>
      <Divider orientation="right">Right Text</Divider>
    </div>
    <div className="section"><div className="section-title">Dashed &amp; Vertical</div>
      <Paragraph>Text <Divider type="vertical"/> <Link>Link</Link> <Divider type="vertical"/> <Link>Link</Link></Paragraph>
      <Divider dashed/>
      <Paragraph>Dashed divider above</Paragraph>
    </div>
  </>);
}

function FlexPage(){
  return(<>
    <div className="section"><div className="section-title">Horizontal</div>
      <Flex gap="middle"><Button type="primary">A</Button><Button type="primary">B</Button><Button type="primary">C</Button></Flex>
    </div>
    <div className="section"><div className="section-title">Vertical</div>
      <Flex vertical gap="small"><Button>Top</Button><Button>Middle</Button><Button>Bottom</Button></Flex>
    </div>
    <div className="section"><div className="section-title">Wrap</div>
      <Flex wrap="wrap" gap={8}>
        {Array.from({length:12},(_,i)=><Button key={i} type="primary" style={{width:80}}>B{i+1}</Button>)}
      </Flex>
    </div>
  </>);
}

function GridPage(){
  return(<>
    <div className="section"><div className="section-title">24-Column Grid</div>
      <Row gutter={[8,8]}>
        <Col span={6}><div style={{background:'#1677ff',color:'#fff',padding:12,borderRadius:4,textAlign:'center'}}>6</div></Col>
        <Col span={6}><div style={{background:'#1677ffaa',padding:12,borderRadius:4,textAlign:'center'}}>6</div></Col>
        <Col span={6}><div style={{background:'#1677ff',color:'#fff',padding:12,borderRadius:4,textAlign:'center'}}>6</div></Col>
        <Col span={6}><div style={{background:'#1677ffaa',padding:12,borderRadius:4,textAlign:'center'}}>6</div></Col>
      </Row>
      <Row gutter={[8,8]} style={{marginTop:8}}>
        <Col span={8}><div style={{background:'#52c41a',color:'#fff',padding:12,borderRadius:4,textAlign:'center'}}>8</div></Col>
        <Col span={16}><div style={{background:'#52c41aaa',padding:12,borderRadius:4,textAlign:'center'}}>16</div></Col>
      </Row>
    </div>
    <div className="section"><div className="section-title">Offset</div>
      <Row gutter={8}>
        <Col span={8}><div style={{background:'#fa8c16',color:'#fff',padding:12,borderRadius:4,textAlign:'center'}}>8</div></Col>
        <Col span={8} offset={8}><div style={{background:'#fa8c16aa',padding:12,borderRadius:4,textAlign:'center'}}>8 offset 8</div></Col>
      </Row>
    </div>
  </>);
}

function LayoutPage(){
  return(<>
    <div className="section"><div className="section-title">Basic Layout</div>
      <Layout style={{borderRadius:8,overflow:'hidden'}}>
        <Layout.Header style={{background:'#001529',color:'#fff',padding:'0 24px',lineHeight:'64px'}}>Header</Layout.Header>
        <Layout.Content style={{background:'#fff',padding:24,minHeight:120}}>Content</Layout.Content>
        <Layout.Footer style={{background:'#f0f2f5',textAlign:'center'}}>Footer</Layout.Footer>
      </Layout>
    </div>
    <div className="section"><div className="section-title">With Sider</div>
      <Layout style={{borderRadius:8,overflow:'hidden'}}>
        <Layout.Sider width={160} style={{background:'#001529',color:'#fff',padding:'24px 0'}}>
          <div style={{padding:'8px 24px',cursor:'pointer'}}>nav 1</div>
          <div style={{padding:'8px 24px',cursor:'pointer'}}>nav 2</div>
          <div style={{padding:'8px 24px',cursor:'pointer'}}>nav 3</div>
        </Layout.Sider>
        <Layout>
          <Layout.Header style={{background:'#fff',padding:'0 24px',lineHeight:'64px',borderBottom:'1px solid #f0f0f0'}}>Header</Layout.Header>
          <Layout.Content style={{background:'#fff',padding:24,minHeight:80}}>Content</Layout.Content>
        </Layout>
      </Layout>
    </div>
  </>);
}

function SpacePage(){
  return(<>
    <div className="section"><div className="section-title">Horizontal</div>
      <Space><Button>A</Button><Button>B</Button><Button>C</Button></Space>
    </div>
    <div className="section"><div className="section-title">Vertical</div>
      <Space direction="vertical"><Button>Top</Button><Button>Middle</Button><Button>Bottom</Button></Space>
    </div>
    <div className="section"><div className="section-title">Size</div>
      <Space size="small"><Button>S</Button><Button>S</Button></Space><br/><br/>
      <Space size="middle"><Button>M</Button><Button>M</Button></Space><br/><br/>
      <Space size="large"><Button>L</Button><Button>L</Button></Space>
    </div>
  </>);
}

function SplitterPage(){
  return(<>
    <div className="section"><div className="section-title">Basic Splitter</div>
      <div style={{height:200,border:'1px solid #d9d9d9',borderRadius:8,display:'flex',overflow:'hidden'}}>
        <div style={{flex:'0 0 50%',background:'#f0f5ff',padding:16,display:'flex',alignItems:'center',justifyContent:'center'}}>Left Panel</div>
        <div style={{width:4,background:'#d9d9d9',cursor:'col-resize'}}/>
        <div style={{flex:1,background:'#fff6ff',padding:16,display:'flex',alignItems:'center',justifyContent:'center'}}>Right Panel</div>
      </div>
    </div>
  </>);
}

function AffixPage(){
  return(<>
    <div className="section"><div className="section-title">Affix</div>
      <Affix offsetTop={10}>
        <Button type="primary">Affix Top 10px</Button>
      </Affix>
      <div style={{marginTop:16,color:'#8c8c8c'}}>Scroll the page to see the button stick to the top.</div>
    </div>
  </>);
}

function AnchorPage(){
  return(<>
    <div className="section"><div className="section-title">Anchor</div>
      <Anchor
        items={[
          { key:'part1', href:'#part1', title:'Part 1' },
          { key:'part2', href:'#part2', title:'Part 2' },
          { key:'part3', href:'#part3', title:'Part 3' },
        ]}
      />
      <div id="part1" style={{height:100,background:'#f0f5ff',padding:16,marginTop:12,borderRadius:4}}>Part 1 content</div>
      <div id="part2" style={{height:100,background:'#f6ffed',padding:16,marginTop:12,borderRadius:4}}>Part 2 content</div>
      <div id="part3" style={{height:100,background:'#fff7e6',padding:16,marginTop:12,borderRadius:4}}>Part 3 content</div>
    </div>
  </>);
}

function BreadcrumbPage(){
  return(<>
    <div className="section"><div className="section-title">Basic</div>
      <Breadcrumb items={[
        { title: 'Home' },{ title: 'Products' },{ title: 'Detail' }
      ]}/>
    </div>
    <div className="section"><div className="section-title">With Separator</div>
      <Breadcrumb separator=">">
        <Breadcrumb.Item>Home</Breadcrumb.Item>
        <Breadcrumb.Item>Application</Breadcrumb.Item>
        <Breadcrumb.Item>List</Breadcrumb.Item>
      </Breadcrumb>
    </div>
  </>);
}

function DropdownPage(){
  return(<>
    <div className="section"><div className="section-title">Basic</div>
      <div className="demo-row">
        <Dropdown menu={{items:[
          {key:'1',label:'Menu Item 1'},{key:'2',label:'Menu Item 2'},
          {type:'divider'},{key:'3',label:'Menu Item 3'},
        ]}}>
          <Button>Hover me <DownOutlined style={{fontSize:10}}/></Button>
        </Dropdown>
        <Dropdown menu={{items:[
          {key:'1',label:'Action 1'},{key:'2',label:'Action 2'},{key:'3',label:'Action 3'},
        ]}} trigger={['contextMenu']}>
          <Button type="primary">Right Click</Button>
        </Dropdown>
      </div>
    </div>
  </>);
}

function MenuPage(){
  return(<>
    <div className="section"><div className="section-title">Horizontal</div>
      <Menu mode="horizontal" defaultSelectedKeys={['mail']} items={[
        {key:'mail',label:'Mail',icon:<MailOutlined/>},
        {key:'app',label:'App',icon:<AppstoreOutlined/>},
        {key:'sub',label:'Sub Menu',children:[{key:'s1',label:'Option 1'},{key:'s2',label:'Option 2'}]},
      ]}/>
    </div>
    <div className="section"><div className="section-title">Vertical / Inline</div>
      <div style={{width:200}}>
        <Menu mode="inline" defaultSelectedKeys={['1']} items={[
          {key:'1',label:'Option 1',icon:<HomeOutlined/>},
          {key:'2',label:'Option 2',icon:<UserOutlined/>},
          {key:'sub',label:'Navigation',icon:<SettingOutlined/>,
           children:[{key:'s1',label:'Sub 1'},{key:'s2',label:'Sub 2'}]},
        ]}/>
      </div>
    </div>
  </>);
}

function PaginationPage(){
  return(<>
    <div className="section"><div className="section-title">Basic</div>
      <Pagination defaultCurrent={1} total={50}/>
    </div>
    <div className="section"><div className="section-title">More Options</div>
      <Pagination showSizeChanger showQuickJumper defaultCurrent={1} total={200} showTotal={total=>`Total ${total} items`}/>
    </div>
    <div className="section"><div className="section-title">Simple</div>
      <Pagination simple defaultCurrent={1} total={50}/>
    </div>
  </>);
}

function StepsPage(){
  return(<>
    <div className="section"><div className="section-title">Basic</div>
      <Steps current={1} items={[{title:'Finished'},{title:'In Progress'},{title:'Waiting'}]}/>

function AutoCompletePage(){
  const [options,setOptions]=useState([]);
  const onSearch=(v)=>setOptions(v?[{value:v},{value:v+v},{value:v+'!'}]:[]);

      <AutoComplete style={{width:280}} options={options} onSearch={onSearch} placeholder="Type to search..."/>

    <div className="section"><div className="section-title">Basic</div>
      <div className="demo-row">
        <Checkbox>Apple</Checkbox><Checkbox defaultChecked>Banana</Checkbox><Checkbox>Orange</Checkbox>
      </div>

function ColorPickerPage(){
  return(<>
    <div className="section"><div className="section-title">Basic</div>
      <div className="demo-row"><ColorPicker defaultValue="#1677ff"/><span style={{marginLeft:8}}>Pick a color</span></div>

function DatePickerPage(){
  return(<>
    <div className="section"><div className="section-title">Basic</div>
      <div className="demo-row"><DatePicker/><RangePicker style={{marginLeft:12}}/></div>
    </div>
    <div className="section"><div className="section-title">Sizes</div>
      <div className="demo-row">
        <DatePicker size="large" placeholder="Large"/>

function FormPage(){
  return(<>
    <div className="section"><div className="section-title">Basic Form</div>
      <Form layout="horizontal" style={{maxWidth:480}}

function InputPage(){
  return(<>
    <div className="section"><div className="section-title">Basic</div>
      <div className="demo-row"><Input placeholder="Basic input" style={{width:240}}/><Input placeholder="Disabled" disabled style={{width:240}}/></div>
    </div>
    <div className="section"><div className="section-title">Sizes</div>
      <div className="demo-row">
        <Input size="large" placeholder="Large" style={{width:180}}/>
        <Input placeholder="Middle" style={{width:180}}/>
        <Input size="small" placeholder="Small" style={{width:180}}/>

   ═══════════════════════════════════════════════════ */
const pageMap = {
  Button:ButtonPage,Icon:IconPage,Typography:TypographyPage,
  Divider:DividerPage,Flex:FlexPage,Grid:GridPage,Layout:LayoutPage,Space:SpacePage,Splitter:SplitterPage,
  Affix:AffixPage,Anchor:AnchorPage,Breadcrumb:BreadcrumbPage,Dropdown:DropdownPage,Menu:MenuPage,
  Pagination:PaginationPage,Steps:StepsPage,
  AutoComplete:AutoCompletePage,Cascader:CascaderPage,Checkbox:CheckboxPage,ColorPicker:ColorPickerPage,
  DatePicker:DatePickerPage,Form:FormPage,Input:InputPage,InputNumber:InputNumberPage,Mentions:MentionsPage,
  Radio:RadioPage,Rate:RatePage,Select:SelectPage,Slider:SliderPage,Switch:SwitchPage,
  TimePicker:TimePickerPage,Transfer:TransferPage,TreeSelect:TreeSelectPage,Upload:UploadPage,
  Avatar:AvatarPage,Badge:BadgePage,Calendar:CalendarPage,Card:CardPage,Carousel:CarouselPage,
  Collapse:CollapsePage,Descriptions:DescriptionsPage,Empty:EmptyPage,Image:ImagePage,List:ListPage,
  Popover:PopoverPage,QRCode:QRCodePage,Segmented:SegmentedPage,Statistic:StatisticPage,Table:TablePage,
  Tabs:TabsPage,Tag:TagPage,Timeline:TimelinePage,Tooltip:TooltipPage,Tree:TreePage,
  Alert:AlertPage,Drawer:DrawerPage,Message:MessagePage,Modal:ModalPage,Notification:NotificationPage,
  Popconfirm:PopconfirmPage,Progress:ProgressPage,Result:ResultPage,Skeleton:SkeletonPage,Spin:SpinPage,
  Tour:TourPage,Watermark:WatermarkPage,
  App:AppPage,ConfigProvider:ConfigProviderPage,FloatButton:FloatButtonPage,
};

/* ═══════════════════════════════════════════════════
   Main App
   ═══════════════════════════════════════════════════ */
function AppLayout(){
  const [active,setActive]=useState('Button');
  const PageComp=pageMap[active]||(()=>(<div>Not found</div>));

  return(
    <ConfigProvider theme={{token:{colorPrimary:'#1677ff'}}}>
      <div className="layout">
        <div className="sidebar">
          <div className="sidebar-brand">Ant Design 5.x</div>
          <div className="sidebar-nav">
            {registry.map(g=>(
              <React.Fragment key={g.cat}>
                <div className="cat-header">{g.cat}</div>
                {g.pages.map(p=>(
                  <div key={p} className={`nav-item${active===p?' active':''}`} onClick={()=>setActive(p)}>{p}</div>
                ))}
              </React.Fragment>
            ))}
          </div>
        </div>
        <div className="content">
          <div className="page-title">{active}</div>
          <PageComp/>
        </div>
      </div>
    </ConfigProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<AppLayout/>);
</script>
</body>
</html>
