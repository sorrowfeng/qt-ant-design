  <style>

:root {
  color-scheme: light;
  --brand: #1677ff;
  --brand-hover: #4096ff;
  --qt: #41cd52;
  --ink: rgba(0, 0, 0, 0.88);
  --text: rgba(0, 0, 0, 0.72);
  --muted: rgba(0, 0, 0, 0.48);
  --line: #f0f0f0;
  --line-strong: #d9d9d9;
  --bg: #fff;
  --surface: #fff;
  --soft: #f5f8ff;
  --code: #f6f8fa;
  --radius: 8px;
  --shadow: 0 8px 24px rgba(18, 35, 64, 0.08);
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  margin: 0;
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", "Helvetica Neue", Arial, sans-serif;
  color: var(--ink);
  background: var(--bg);
  font-size: 14px;
  line-height: 1.7;
}
a { color: inherit; text-decoration: none; }
a:hover { color: var(--brand); }
.skip-link {
  position: fixed;
  top: 8px;
  left: 8px;
  z-index: 1000;
  transform: translateY(-140%);
  padding: 8px 12px;
  border-radius: 6px;
  color: #fff;
  background: var(--brand);
  box-shadow: var(--shadow);
  transition: transform .16s ease;
}
.skip-link:focus {
  transform: translateY(0);
  color: #fff;
  outline: none;
}
.site-header {
  position: sticky;
  top: 0;
  z-index: 50;
  height: 64px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 32px;
  background: rgba(255, 255, 255, 0.94);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(10px);
}
.brand {
  display: inline-flex;
  align-items: center;
  gap: 10px;
  min-width: 190px;
  font-weight: 700;
  font-size: 18px;
}
.brand img { width: 32px; height: 32px; }
.nav {
  display: flex;
  align-items: center;
  gap: 4px;
}
.nav a {
  padding: 8px 12px;
  border-radius: 6px;
  color: var(--text);
}
.nav a.active,
.nav a:hover {
  color: var(--brand);
  background: #e6f4ff;
}
.hero {
  position: relative;
  min-height: clamp(500px, 74vh, 720px);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: clamp(36px, 8vw, 104px);
  padding: 72px max(32px, calc((100vw - 1180px) / 2)) 82px;
  overflow: hidden;
  isolation: isolate;
  background-image: url("/qt-ant-design/resources/images/showcase-light.png");
  background-size: cover;
  background-position: center;
}
.hero::before {
  content: "";
  position: absolute;
  inset: 0;
  z-index: -1;
  background: rgba(255, 255, 255, 0.78);
}
.hero-copy {
  flex: 1 1 640px;
  max-width: 720px;
  min-width: 0;
}
.hero-logo {
  flex: 0 0 auto;
  width: clamp(190px, 23vw, 330px);
  height: auto;
  max-width: 34vw;
  filter: drop-shadow(0 22px 34px rgba(22, 119, 255, 0.18));
}
.eyebrow {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  color: var(--brand);
  font-size: 13px;
  font-weight: 650;
  letter-spacing: 0;
}
h1 {
  margin: 18px 0 18px;
  font-size: clamp(44px, 7vw, 82px);
  line-height: 1.04;
  letter-spacing: 0;
}
.hero p {
  margin: 0;
  max-width: 660px;
  color: rgba(0, 0, 0, 0.68);
  font-size: 18px;
}
.hero-actions {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin-top: 34px;
}
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-height: 40px;
  padding: 8px 18px;
  border: 1px solid var(--line-strong);
  border-radius: 6px;
  background: #fff;
  color: var(--ink);
  font-weight: 600;
}
.btn.primary {
  border-color: var(--brand);
  background: var(--brand);
  color: #fff;
  box-shadow: 0 8px 18px rgba(22, 119, 255, 0.18);
}
.btn.primary:hover { background: var(--brand-hover); color: #fff; }
.section {
  max-width: 1180px;
  margin: 0 auto;
  padding: 68px 32px;
}
.section.compact { padding-top: 46px; }
.section-head {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 24px;
  margin-bottom: 24px;
}
.section h2 {
  margin: 0;
  font-size: 30px;
  line-height: 1.25;
  letter-spacing: 0;
}
.section-head p,
.lead {
  margin: 8px 0 0;
  max-width: 760px;
  color: var(--text);
}
.stats {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 16px;
}
.stat,
.card,
.doc-card,
.shot {
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--surface);
  box-shadow: var(--shadow);
}
.stat {
  padding: 20px;
}
.stat strong {
  display: block;
  font-size: 32px;
  line-height: 1.1;
}
.stat span { color: var(--muted); }
.feature-grid,
.doc-grid {
  display: grid;
  grid-template-columns: repeat(4, minmax(0, 1fr));
  gap: 16px;
}
.card,
.doc-card {
  padding: 22px;
}
.card h3,
.doc-card h3 {
  margin: 0 0 8px;
  font-size: 18px;
}
.card p,
.doc-card p {
  margin: 0;
  color: var(--text);
}
.showcase-grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 18px;
}
.shot {
  overflow: hidden;
}
.shot img {
  display: block;
  width: 100%;
  aspect-ratio: 16 / 9;
  object-fit: cover;
  background: #f5f5f5;
}
.shot figcaption {
  padding: 12px 14px;
  color: var(--muted);
}
.component-strip {
  display: grid;
  grid-template-columns: repeat(6, minmax(0, 1fr));
  gap: 14px;
}
.component-strip a {
  display: block;
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: #fff;
}
.component-strip img {
  display: block;
  width: 100%;
  aspect-ratio: 16 / 10;
  object-fit: cover;
  border-bottom: 1px solid var(--line);
}
.component-strip span {
  display: block;
  padding: 9px 10px;
  color: var(--text);
}
.page-hero {
  border-bottom: 1px solid var(--line);
  background: #fff;
}
.page-hero .section {
  padding-top: 58px;
  padding-bottom: 48px;
}
.page-hero h1 {
  margin: 12px 0 10px;
  font-size: clamp(36px, 5vw, 56px);
}
.content-grid {
  display: grid;
  grid-template-columns: 250px minmax(0, 1fr);
  gap: 32px;
  align-items: start;
}
.side {
  position: sticky;
  top: 88px;
  border-right: 1px solid var(--line);
  padding-right: 18px;
}
.side a {
  display: block;
  padding: 8px 0;
  color: var(--muted);
}
.article {
  min-width: 0;
}
.article section {
  padding-bottom: 28px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 28px;
}
.article h2 {
  margin: 0 0 12px;
  font-size: 26px;
}
.article h3 {
  margin: 22px 0 8px;
  font-size: 18px;
}
.article p,
.article li {
  color: var(--text);
}
.article ul,
.article ol {
  padding-left: 20px;
}
pre {
  margin: 14px 0;
  overflow: auto;
  border: 1px solid var(--line);
  border-radius: var(--radius);
  background: var(--code);
}
code {
  font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
  font-size: 12px;
}
pre code {
  display: block;
  padding: 16px;
  line-height: 1.65;
}
.callout {
  padding: 16px 18px;
  border: 1px solid #91caff;
  border-radius: var(--radius);
  background: #e6f4ff;
  color: rgba(0, 0, 0, 0.72);
}
.footer {
  border-top: 1px solid var(--line);
  padding: 24px 32px;
  color: var(--muted);
  text-align: center;
}
@media (max-width: 980px) {
  .site-header { padding: 0 18px; }
  .nav { gap: 0; }
  .nav a { padding: 7px 9px; }
  .hero {
    align-items: flex-start;
    flex-direction: column;
  }
  .hero-logo {
    order: -1;
    width: 148px;
    max-width: 42vw;
  }
  .stats,
  .feature-grid,
  .doc-grid,
  .component-strip {
    grid-template-columns: repeat(2, minmax(0, 1fr));
  }
  .content-grid {
    grid-template-columns: 1fr;
  }
  .side {
    position: static;
    border-right: 0;
    border-bottom: 1px solid var(--line);
    padding: 0 0 14px;
  }
}
@media (max-width: 680px) {
  .site-header {
    height: auto;
    min-height: 64px;
    align-items: flex-start;
    flex-direction: column;
    padding: 10px 20px 0;
  }
  .brand {
    min-width: 0;
    min-height: 44px;
  }
  .brand span { display: inline; }
  .nav {
    width: calc(100% + 40px);
    margin: 0 -20px;
    padding: 0 20px 10px;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .nav::-webkit-scrollbar { display: none; }
  .nav a {
    flex: 0 0 auto;
    padding: 6px 10px;
    white-space: nowrap;
  }
  .hero { padding: 54px 20px 62px; }
  .hero-logo { width: 120px; }
  .hero p { font-size: 16px; }
  .section { padding: 44px 20px; }
  .section-head { display: block; }
  .stats,
  .feature-grid,
  .doc-grid,
  .showcase-grid,
  .component-strip {
    grid-template-columns: 1fr;
  }
}

  </style>

        </div>

    </section>
