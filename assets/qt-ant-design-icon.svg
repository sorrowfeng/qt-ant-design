<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>qt-ant-design icon</title>
  <defs>
    <filter id="soft-shadow" x="-20%" y="-20%" width="140%" height="140%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="28" stdDeviation="34" flood-color="#000000" flood-opacity="0.18"/>
    </filter>
    <filter id="badge-shadow" x="-30%" y="-30%" width="160%" height="160%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g filter="url(#soft-shadow)">
    <image href="sources/ant-design-logo.svg" x="154" y="154" width="716" height="716" preserveAspectRatio="xMidYMid meet"/>
  </g>

  <g filter="url(#badge-shadow)">
    <image href="sources/qt-logo.svg" x="688" y="654" width="220" height="288" preserveAspectRatio="xMidYMid meet"/>
  </g>
</svg>
